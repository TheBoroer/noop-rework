# Compile-and-test verification for the reusable Swift packages.
#
# This job intentionally does NOT touch the macOS app target: that build needs
# XcodeGen to generate Strand.xcodeproj and a wired-up test scheme, and the app
# release is produced and anonymized by hand. The packages, by contrast, build
# and test on their own with plain SwiftPM — no Xcode project, no signing, no
# secrets — which makes them a safe, self-contained CI check that leaks nothing.
name: Swift Packages CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'Packages/**'
      - 'shared/**'
      - 'android/**'
      - 'Tools/**'
      - '.github/workflows/swift-packages.yml'
  push:
    branches: [main]
    paths:
      - 'Packages/**'
      - 'shared/**'
      - 'android/**'
      - 'Tools/**'
      - '.github/workflows/swift-packages.yml'
  workflow_dispatch:

concurrency:
  group: swift-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - WhoopProtocol
          - WhoopStore
          - StrandAnalytics
          - StrandImport
          - StrandDesign
          - NoopLocalAccess
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WhoopProtocol's SPM package consumes Shared.xcframework as a local binaryTarget,
      # which is built from the Kotlin shared module and is gitignored: build it here
      # before this package can be compiled, same as app-build.yml does for the app targets.
      # WhoopStore, StrandAnalytics, and StrandImport all depend on WhoopProtocol via a local
      # path (`.package(path: "../WhoopProtocol")`), so they compile it from source too and hit
      # the same missing-binary-artifact error without the framework in place.
      - name: Set up JDK 21
        if: contains(fromJSON('["WhoopProtocol","WhoopStore","StrandAnalytics","StrandImport"]'), matrix.package)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Shared.xcframework
        if: contains(fromJSON('["WhoopProtocol","WhoopStore","StrandAnalytics","StrandImport"]'), matrix.package)
        run: ./Tools/build-shared-xcframework.sh Release

      - name: Build ${{ matrix.package }}
        run: swift build
        working-directory: Packages/${{ matrix.package }}

      - name: Test ${{ matrix.package }}
        run: swift test
        working-directory: Packages/${{ matrix.package }}
