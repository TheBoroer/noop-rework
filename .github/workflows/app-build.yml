# Compile-only verification for the macOS and iOS app targets.
#
# Why this exists: the iOS app is a build-from-source community port (no App Store —
# NOOP stays anonymous), so it isn't exercised on a device by the maintainer. This job
# compiles both app targets on every relevant change so a shared-code change can't
# silently break iOS (or regress macOS). It is anonymity-safe: CODE_SIGNING_ALLOWED=NO,
# no secrets, no signing identity, no artifacts uploaded — it only checks that it builds.
# (The shipped macOS .app is still produced and anonymized by hand; this is a compile gate.)
name: App build (macOS + iOS)

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'shared/**'
      - 'android/**'
      - 'Tools/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  push:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'shared/**'
      - 'android/**'
      - 'Tools/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  workflow_dispatch:

concurrency:
  group: app-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          # #51: the macOS build must be universal — 'platform=macOS' on an Apple-Silicon runner thins to
          # arm64-only. Use the generic destination + explicit ARCHS so this CI verify catches an x86_64
          # break at PR time (matches the release/testing workflows).
          - scheme: Strand
            destination: 'generic/platform=macOS'
            extra_args: 'ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO'
          - scheme: NOOPiOS
            destination: 'generic/platform=iOS Simulator'
            extra_args: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The iOS app compiles against the iOS 26 SDK: RootTabView's Liquid Glass tab bar calls
      # glassEffect(.regular,in:) (iOS 26) behind an #available(iOS 26.0) runtime guard with an
      # .ultraThinMaterial fallback for iOS 17-25. #available is a RUNTIME check, so the symbol must
      # still exist in the compile SDK; the runner default (Xcode 16.4 / iOS 18.5 SDK) lacks it and
      # NOOPiOS fails to type-check. Select the newest Xcode 26.x present (macOS builds fine on it too).
      - name: Select Xcode 26 (iOS 26 SDK)
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE_APP" ]; then echo "No Xcode 26.x on this runner" >&2; exit 1; fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP"
          xcodebuild -version

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Shared.xcframework
        run: ./Tools/build-shared-xcframework.sh Release

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build ${{ matrix.scheme }}
        run: >-
          xcodebuild -scheme '${{ matrix.scheme }}' -configuration Debug
          -destination '${{ matrix.destination }}' ${{ matrix.extra_args }}
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          build
